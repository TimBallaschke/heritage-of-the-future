title: Artwork

fields:
  number:
    label: Number
    type: number
    min: 1
    step: 1
    width: 1/4
    translate: false

  image_path:
    label: Image path
    type: text
    width: 3/4
    placeholder: assets/images/image-1.png
    translate: false
    help: Path relative to the site root.

  artist_name:
    label: Artist name
    type: text
    help: Use <br> to force a line break.

  artwork_title:
    label: Artwork title
    type: text
    help: Use <br> to force a line break.

  audio_path:
    label: Audio path
    type: text
    placeholder: assets/audio/voice-01.mp3
    help: Path relative to the site root. Translatable.
